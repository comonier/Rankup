# +---------------------------------------------------------------------------+
# |                           Rankup - Ranks Configuration                    |
# +---------------------------------------------------------------------------+
# Colors: [] in Dark Gray (&8), 'R' in Blue (&9), Numbers in Orange (&6)
#
# Requirements:
#   money: Amount deducted upon rankup.
#   xp-levels: XP levels deducted upon rankup.
#   play-time-minutes: Total playtime required (not deducted).
#
# Rewards:
#   commands: Console commands executed (%player% is replaced by player name).
#   permissions: LuckPerms permissions granted automatically.

ranks:
  '0':
    display-name: "&8[&9R&60&8]"
    tag: "&8[&9R&60&8]"
    requirements:
      money: 0
      xp-levels: 0
      play-time-minutes: 0
    rewards:
      commands: []
      permissions: []
    announce: false

  '1':
    display-name: "&8[&9R&61&8]"
    tag: "&8[&9R&61&8]"
    requirements:
      money: 1000.0
      xp-levels: 5
      play-time-minutes: 60
    rewards:
      commands:
        - "adjustbonusclaimblocks %player% 1000"
      permissions:
